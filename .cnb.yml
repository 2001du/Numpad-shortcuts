# 云开发环境配置
# 用于 VSCode 云原生开发环境的持久化配置

# 匹配所有分支
**:
  # VSCode 事件：启动云开发环境时触发
  vscode:
    - runner:
        cpus: 8
      docker:
        # 使用 .ide/Dockerfile 构建自定义开发环境镜像
        build: .ide/Dockerfile
        # 持久化配置 - 使用 copy-on-write 缓存
        volumes:
          - /workspace/node_modules:copy-on-write
          - /workspace/out:copy-on-write
          - /root/.npm:copy-on-write
      services:
        - vscode
        - docker
      # 不需要自动执行安装任务，依赖会自动恢复
      stages: []
